# mdbook 0.5.x has breaking changes (renamed sections→items,
# removed "previous" template helper). Pin to 0.4.x until
# mdbook-admonish and our preprocessors support 0.5.

[book]
title = "Vauchi Docs"
description = "Privacy-focused updatable contact cards — documentation"
authors = ["Mattia Egloff"]
language = "en"
src = "src"

[build]
build-dir = "book"

[output.html]
default-theme = "coal"
preferred-dark-theme = "coal"
git-repository-url = "https://gitlab.com/vauchi/docs"
edit-url-template = "https://gitlab.com/vauchi/docs/-/edit/main/src/{path}"
site-url = "/"
no-section-label = false
additional-css = ["src/theme/vauchi.css", "mdbook-admonish.css"]
additional-js = ["theme-switcher.js"]

[output.html.search]
enable = true
limit-results = 20

[preprocessor.admonish]
command = "mdbook-admonish"
assets_version = "3.1.0"

[preprocessor.beautiful-mermaid]
command = "node mdbook-beautiful-mermaid.mjs"

[output.html.playground]
editable = false
