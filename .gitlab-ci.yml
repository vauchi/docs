# GitLab CI for vauchi-docs
#
# Documentation linting + secret detection
#
# Uses shared templates from vauchi/scripts for consistency.

include:
  - project: 'vauchi/scripts'
    ref: main
    file:
      - '/ci-templates/lint-docs.yml'
      - '/ci-templates/mr-rules.yml'
  - template: Security/Secret-Detection.gitlab-ci.yml

stages:
  - lint
  - test

# Secret detection — use Docker runner
secret_detection:
  tags: [docker]
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
