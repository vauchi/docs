# GitLab CI for vauchi-docs
#
# Lint → Build mdBook → Docker image → Deploy via _private pipeline

workflow:
  auto_cancel:
    on_new_commit: interruptible
    on_job_failure: all
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "schedule"

default:
  interruptible: true

include:
  - project: 'vauchi/scripts'
    ref: ci-templates-v2026.07.11
    file:
      - '/ci-templates/mr-rules.yml'
      - '/ci-templates/reuse.yml'
      - '/ci-templates/badges.yml'
      - '/ci-templates/github-mirror.yml'
  - template: Security/Secret-Detection.gitlab-ci.yml

variables:
  VAUCHI_SCRIPTS_REF: "ci-templates-v2026.07.11"

stages:
  - lint
  - build
  - package
  - deploy

# Markdown linting
lint:markdown:
  stage: lint
  tags:
    - self-hosted
    - markdownlint
  needs: []
  script:
    - markdownlint 'src/**/*.md' --config .markdownlint.json --ignore node_modules --ignore book
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# Secret detection
secret_detection:
  allow_failure: false
  stage: lint
  tags: [docker]
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Build mdBook
build:docs:
  stage: build
  tags:
    - self-hosted
    - rust
  variables:
    MDBOOK_VERSION: "0.4.44"
  before_script:
    - export PATH="$HOME/.cargo/bin:$PATH"
    - npm --prefix "$CI_PROJECT_DIR" ci --ignore-scripts 2>/dev/null || npm --prefix "$CI_PROJECT_DIR" install 2>/dev/null || true
  script:
    # Pin mdbook to 0.4.x — 0.5.x has breaking changes
    - |
      CURRENT=$(mdbook --version 2>/dev/null | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' || echo "none")
      if [ "$CURRENT" != "$MDBOOK_VERSION" ]; then
        echo "mdbook $CURRENT != pinned $MDBOOK_VERSION — installing..."
        cargo install mdbook --version "$MDBOOK_VERSION" --locked 2>/dev/null || true
      fi
    - mdbook build
    # Generate sitemap.xml from the actual book/ output (replaces the old
    # hand-maintained src/sitemap.xml that drifted and emitted 404 URLs).
    - sh scripts/gen-sitemap.sh book
    # .well-known/ now lives under src/ and is copied by mdBook automatically.
    - |
      cat > book/build-info.json <<EOF
      {"sha":"$CI_COMMIT_SHA","short_sha":"$CI_COMMIT_SHORT_SHA","ref":"$CI_COMMIT_REF_NAME","built":"$(date -u +%Y-%m-%dT%H:%M:%SZ)","pipeline":"$CI_PIPELINE_URL"}
      EOF
  artifacts:
    paths:
      - book/
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Build Docker image (main branch only) — daemonless via kaniko.
# Both CI docker runners run a rootless, unprivileged dockerd since the
# 2026-07-20 reinstall, so docker:dind (needs --privileged) cannot start
# ("dial tcp: lookup docker: no such host"). Same pattern as
# ohttp-relay's .kaniko-build (5c625d2b).
package:docker:
  stage: package
  tags: [docker]
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [""]
  variables:
    IMAGE: registry.gitlab.com/vauchi/docs
  needs:
    - build:docs
  before_script:
    # kaniko reads registry + dependency-proxy creds from this file. The
    # proxy auth routes the Dockerfile's `FROM ${HUB}/nginx:alpine` pull
    # through GitLab's dependency proxy (default HUB is `docker.io/library`
    # so local `docker build .` still works without args).
    - mkdir -p /kaniko/.docker
    - |
      cat > /kaniko/.docker/config.json <<JSON
      {"auths":{
        "${CI_REGISTRY}":{"auth":"$(printf '%s:%s' "$CI_REGISTRY_USER" "$CI_REGISTRY_PASSWORD" | base64 | tr -d '\n')"},
        "${CI_DEPENDENCY_PROXY_SERVER}":{"auth":"$(printf '%s:%s' "$CI_DEPENDENCY_PROXY_USER" "$CI_DEPENDENCY_PROXY_PASSWORD" | base64 | tr -d '\n')"}
      }}
      JSON
  script:
    - |
      /kaniko/executor \
        --context "$CI_PROJECT_DIR" \
        --dockerfile "$CI_PROJECT_DIR/Dockerfile" \
        --build-arg HUB="${CI_DEPENDENCY_PROXY_GROUP_IMAGE_PREFIX}" \
        --destination "$IMAGE:$CI_COMMIT_SHA" \
        --destination "$IMAGE:latest"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Deploy docs to production via _private pipeline
# Auto-triggers the centralized deploy pipeline in _private.
# The _private pipeline has manual gate jobs — click "play" there.
deploy:trigger:
  stage: deploy
  needs:
    - job: package:docker
  trigger:
    project: vauchi/private
    branch: main
  variables:
    DEPLOY_SERVICE: docs
    DEPLOY_IMAGE: registry.gitlab.com/vauchi/docs:$CI_COMMIT_SHA
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

pages:
  extends: .badges-pages

github-mirror:
  extends: .github-mirror
