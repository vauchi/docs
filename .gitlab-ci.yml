# GitLab CI for vauchi-docs
#
# Documentation linting, mkdocs build, and deployment
#
# Uses shared templates from vauchi/scripts for consistency.

include:
  - project: 'vauchi/scripts'
    ref: main
    file:
      - '/ci-templates/mr-rules.yml'
      - '/ci-templates/reuse.yml'
  - template: Security/Secret-Detection.gitlab-ci.yml

stages:
  - lint
  - test
  - build
  - deploy

# Markdown linting — use self-hosted runner (markdownlint pre-installed)
lint:markdown:
  stage: lint
  tags:
    - self-hosted
    - markdownlint
  needs: []
  script:
    - markdownlint '**/*.md' --config .markdownlint.json --ignore node_modules --ignore site
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# Secret detection
secret_detection:
  tags: [docker]
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Build mkdocs site — use self-hosted runner (mkdocs-material pre-installed)
build:docs:
  stage: build
  tags:
    - self-hosted
    - mkdocs
  script:
    - mkdocs build --strict
    - |
      cat > site/build-info.json <<EOF
      {"sha":"$CI_COMMIT_SHA","short_sha":"$CI_COMMIT_SHORT_SHA","ref":"$CI_COMMIT_REF_NAME","built":"$(date -u +%Y-%m-%dT%H:%M:%SZ)","pipeline":"$CI_PIPELINE_URL"}
      EOF
  artifacts:
    paths:
      - site/
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Deploy to GitLab Pages
pages:
  stage: deploy
  tags:
    - self-hosted
    - mkdocs
  script:
    - mv site public
    - |
      curl --silent --fail \
        "${CI_API_V4_URL}/projects/vauchi%2Fscripts/repository/files/scripts%2Fci%2Fgenerate-badges.sh/raw?ref=main" \
        -o generate-badges.sh
      chmod +x generate-badges.sh
    - ./generate-badges.sh public/badges
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  needs:
    - build:docs
