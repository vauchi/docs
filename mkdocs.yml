site_name: Vauchi Docs
site_url: https://docs.vauchi.app
site_description: Privacy-focused updatable contact cards
repo_url: https://gitlab.com/vauchi/vauchi
repo_name: vauchi/vauchi

copyright: Copyright &copy; 2026 Vauchi Contributors

theme:
  name: material
  custom_dir: overrides
  logo: assets/logo.png
  favicon: assets/logo.png
  palette:
    - scheme: vauchi-dark
      toggle:
        icon: material/brightness-7
        name: Light mode
    - scheme: vauchi-light
      toggle:
        icon: material/brightness-4
        name: Dark mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/gitlab
  font:
    text: Inter
    code: JetBrains Mono

nav:
  - Home: index.md

  - For Users:
    - users/index.md
    - Getting Started: users/getting-started.md
    - FAQ: users/faq.md
    - Features:
      - users/features/index.md
      - Contact Exchange: users/features/contact-exchange.md
      - Privacy Controls: users/features/privacy-controls.md
      - Multi-Device Sync: users/features/multi-device.md
      - Auto Updates: users/features/auto-updates.md
      - Backup & Recovery: users/features/backup-recovery.md
      - Encryption: users/features/encryption.md
    - How-To Guides:
      - users/guides/index.md
      - Exchange Contacts: users/guides/exchange.md
      - Set Up Multi-Device: users/guides/multi-device.md
      - Recover Your Account: users/guides/recovery.md
      - Manage Visibility: users/guides/visibility.md

  - About:
    - about/index.md
    - Our Principles: about/principles.md
    - Security: about/security.md
    - Community: about/community.md
    - Supporters: about/supporters.md

  - Legal:
    - Privacy Policy: legal/privacy-policy.md

  - For Developers:
    - developers/index.md
    - Contributing: developers/contributing.md
    - GUI Guidelines: developers/gui-guidelines.md
    - UX Interaction Guidelines: developers/ux-guidelines.md
    - TDD Rules: developers/tdd-rules.md
    - Architecture: developers/architecture.md
    - Cryptography: developers/crypto.md
    - Threat Model: developers/threat-model.md
    - Tech Stack: developers/tech-stack.md
    - Diagrams:
      - developers/diagrams/index.md
      - Contact Exchange: developers/diagrams/contact-exchange.md
      - Device Linking: developers/diagrams/device-linking.md
      - Sync Updates: developers/diagrams/sync-updates.md
      - Recovery: developers/diagrams/contact-recovery.md
      - Message Delivery: developers/diagrams/message-delivery.md
      - Crypto Hierarchy: developers/diagrams/crypto-hierarchy.md

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/theme-picker.js

extra:
  social:
    - icon: fontawesome/brands/gitlab
      link: https://gitlab.com/vauchi
    - icon: fontawesome/brands/github
      link: https://github.com/vauchi
