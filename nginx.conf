server {
    listen 80;
    server_name docs.vauchi.app;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers (matching vauchi.app)
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'none'; script-src 'self' https://cdn.vauchi.app; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' https://cdn.vauchi.app; frame-ancestors 'none'; base-uri 'self'; form-action 'none'" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/html image/svg+xml;
    gzip_min_length 256;

    # mdBook pages — try exact path, then /index.html fallback
    location / {
        try_files $uri $uri/index.html $uri.html =404;
    }

    # Cache static assets — fonts and images are immutable
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # JS/CSS change with deployments — short TTL with revalidation
    location ~* \.(js|css|json)$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # Health check
    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # Custom 404
    error_page 404 /404.html;
}
